

<style>
  h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  *{box-sizing:border-box}
  #game-root{padding:1.5rem 0;font-family:var(--font-sans);color:var(--color-text-primary)}
  #game-root h1{font-size:22px;font-weight:500;margin-bottom:4px;text-align:center}
  .sub{font-size:13px;color:var(--color-text-secondary);text-align:center;margin-bottom:1.5rem}
  #game-wrap{position:relative;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.5rem}
  .board{display:grid;gap:10px;justify-content:center;margin-bottom:1.25rem}

  .card-wrap{width:80px;height:80px;perspective:900px;cursor:pointer;transition:transform 0.15s}
  .card-wrap:hover:not(.matched){transform:scale(1.08)}
  .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(.4,1.4,.6,1)}
  .card-wrap.flip .card-inner{transform:rotateY(180deg)}

  .card-face{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:30px;backface-visibility:hidden}
  .card-front{
    background:linear-gradient(135deg,#534AB7,#7F77DD);
    border:2px solid #AFA9EC;
    box-shadow:0 4px 12px rgba(83,74,183,0.35);
  }
  .card-front::after{
    content:'?';
    font-size:28px;
    font-weight:500;
    color:rgba(255,255,255,0.7);
  }
  .card-back{
    background:linear-gradient(135deg,#fff 0%,#f0f4ff 100%);
    border:2px solid #AFA9EC;
    transform:rotateY(180deg);
    box-shadow:0 4px 12px rgba(83,74,183,0.2);
  }
  .card-wrap.matched .card-inner{animation:matched-pop 0.4s ease forwards}
  .card-wrap.matched .card-face{
    border-color:#1D9E75;
    background:linear-gradient(135deg,#E1F5EE,#9FE1CB);
    box-shadow:0 0 0 3px rgba(29,158,117,0.3);
  }
  @keyframes matched-pop{
    0%{transform:rotateY(180deg) scale(1)}
    40%{transform:rotateY(180deg) scale(1.18)}
    70%{transform:rotateY(180deg) scale(0.94)}
    100%{transform:rotateY(180deg) scale(1)}
  }

  .stats{display:flex;gap:12px;justify-content:center;margin-bottom:1rem}
  .stat{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 16px;font-size:12px;color:var(--color-text-secondary);text-align:center;min-width:72px}
  .stat span{display:block;font-size:20px;font-weight:500;color:var(--color-text-primary);line-height:1.2}

  .controls{display:flex;gap:8px;justify-content:center}
  .controls button,.controls select{padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer}
  .controls button:hover{background:var(--color-background-secondary)}

  .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;border-radius:var(--border-radius-lg);z-index:10;backdrop-filter:blur(2px)}
  .overlay.show{display:flex;animation:fade-in 0.4s ease}
  @keyframes fade-in{from{opacity:0}to{opacity:1}}

  .win-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem 2.5rem;text-align:center;animation:win-pop 0.5s cubic-bezier(.4,1.5,.6,1)}
  @keyframes win-pop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
  .trophy{font-size:48px;margin-bottom:8px;animation:spin-in 0.6s cubic-bezier(.4,1.5,.6,1) 0.2s both}
  @keyframes spin-in{from{transform:rotate(-30deg) scale(0);opacity:0}to{transform:rotate(0deg) scale(1);opacity:1}}
  .win-box h2{font-size:22px;font-weight:500;margin-bottom:4px;color:var(--color-text-primary)}
  .win-tagline{font-size:14px;color:var(--color-text-secondary);margin-bottom:6px}
  .win-stats{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem;padding:8px 16px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
  .win-btn{padding:9px 24px;border-radius:var(--border-radius-md);border:0.5px solid #7F77DD;background:linear-gradient(135deg,#534AB7,#7F77DD);color:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:transform 0.15s}
  .win-btn:hover{transform:scale(1.04)}

  .confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:var(--border-radius-lg)}
  .confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0;animation:confetti-fall 1.2s ease forwards}
  @keyframes confetti-fall{
    0%{opacity:1;transform:translateY(-10px) rotate(0deg)}
    100%{opacity:0;transform:translateY(300px) rotate(720deg)}
  }
</style>

<h2 class="sr-only">Memory card game — flip cards to find matching pairs</h2>
<div id="game-root">
  <h1>Memory card game</h1>
  <p class="sub">Match all pairs as fast as you can!</p>
  <div id="game-wrap">
    <div class="board" id="board"></div>
    <div class="stats">
      <div class="stat"><span id="moves">0</span>Moves</div>
      <div class="stat"><span id="matches">0</span>Matches</div>
      <div class="stat"><span id="time">0</span>Seconds</div>
    </div>
    <div class="controls">
      <button id="restartBtn">Restart</button>
      <select id="diffSel">
        <option value="8">Easy (8 pairs)</option>
        <option value="10">Medium (10 pairs)</option>
        <option value="12">Hard (12 pairs)</option>
      </select>
    </div>
    <div class="overlay" id="overlay">
      <div class="confetti-wrap" id="confettiWrap"></div>
      <div class="win-box">
        <div class="trophy">🏆</div>
        <h2>Congratulations!</h2>
        <p class="win-tagline">You matched all the pairs!</p>
        <div class="win-stats" id="finalStats"></div>
        <button class="win-btn" id="playAgain">Play again</button>
      </div>
    </div>
  </div>
</div>

<script>
const EMOJIS=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐵','🐔','🐧','🐦','🦆','🦉','🦇','🐝','🦋','🐛','🐌'];
const CONFETTI_COLORS=['#534AB7','#1D9E75','#D85A30','#EF9F27','#D4537E','#378ADD'];
let pairs=8,flipped=[],matched=0,moves=0,locked=false,timer=null,secs=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startTimer(){clearInterval(timer);secs=0;document.getElementById('time').textContent='0';timer=setInterval(()=>{secs++;document.getElementById('time').textContent=secs;},1000);}

function getRating(m,p){const ideal=p+4;if(m<=ideal)return'Perfect game!';if(m<=ideal*1.5)return'Great job!';if(m<=ideal*2)return'Well done!';return'Keep practicing!';}

function spawnConfetti(){
  const wrap=document.getElementById('confettiWrap');
  wrap.innerHTML='';
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'%';
    el.style.top=Math.random()*20+'%';
    el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    el.style.width=(6+Math.random()*8)+'px';
    el.style.height=(6+Math.random()*8)+'px';
    el.style.animationDelay=(Math.random()*0.8)+'s';
    el.style.animationDuration=(0.8+Math.random()*0.8)+'s';
    wrap.appendChild(el);
  }
}

function init(){
  matched=0;moves=0;locked=false;flipped=[];
  document.getElementById('moves').textContent='0';
  document.getElementById('matches').textContent='0';
  document.getElementById('overlay').classList.remove('show');
  clearInterval(timer);secs=0;document.getElementById('time').textContent='0';
  const chosen=EMOJIS.slice(0,pairs);
  const cards=shuffle([...chosen,...chosen]);
  const board=document.getElementById('board');
  const cols=pairs<=8?4:pairs<=10?5:6;
  board.style.gridTemplateColumns=`repeat(${cols},80px)`;
  board.innerHTML='';
  cards.forEach((em)=>{
    const w=document.createElement('div');
    w.className='card-wrap';
    w.innerHTML=`<div class="card-inner"><div class="card-face card-front"></div><div class="card-face card-back">${em}</div></div>`;
    w.addEventListener('click',()=>flip(w,em));
    board.appendChild(w);
  });
}

function flip(el,em){
  if(locked||el.classList.contains('flip')||el.classList.contains('matched'))return;
  if(flipped.length===0)startTimer();
  el.classList.add('flip');
  flipped.push({el,em});
  if(flipped.length===2){
    locked=true;moves++;
    document.getElementById('moves').textContent=moves;
    if(flipped[0].em===flipped[1].em){
      flipped[0].el.classList.add('matched');
      flipped[1].el.classList.add('matched');
      matched++;
      document.getElementById('matches').textContent=matched;
      flipped=[];locked=false;
      if(matched===pairs){
        clearInterval(timer);
        setTimeout(()=>{
          spawnConfetti();
          document.getElementById('finalStats').textContent=`${moves} moves  •  ${secs} seconds  •  ${getRating(moves,pairs)}`;
          document.getElementById('overlay').classList.add('show');
        },400);
      }
    }else{
      setTimeout(()=>{
        flipped[0].el.classList.remove('flip');
        flipped[1].el.classList.remove('flip');
        flipped=[];locked=false;
      },900);
    }
  }
}

document.getElementById('restartBtn').addEventListener('click',init);
document.getElementById('playAgain').addEventListener('click',init);
document.getElementById('diffSel').addEventListener('change',e=>{pairs=+e.target.value;init();});
init();
</script>
