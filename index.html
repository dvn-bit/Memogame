

<style>
*{box-sizing:border-box;margin:0;padding:0}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
#root{font-family:var(--font-sans);color:var(--color-text-primary);padding:1.5rem 1rem;min-height:520px}
.screen{display:none}
.screen.active{display:block}

/* HOME SCREEN */
#home{max-width:400px;margin:0 auto;text-align:center;padding-top:1rem}
.home-trophy{font-size:52px;margin-bottom:1rem;display:block}
.home-title{font-size:22px;font-weight:500;margin-bottom:6px}
.home-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:2rem}
.level-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:2rem}
.level-card{background:var(--color-background-primary);border:2px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 0.75rem;cursor:pointer;transition:border-color 0.15s,transform 0.15s;text-align:center}
.level-card:hover{border-color:#7F77DD;transform:translateY(-2px)}
.level-card.selected{border-color:#534AB7;background:#EEEDFE}
.level-icon{font-size:26px;margin-bottom:6px;display:block}
.level-name{font-size:14px;font-weight:500;display:block;color:var(--color-text-primary)}
.level-pairs{font-size:12px;color:var(--color-text-secondary);display:block;margin-top:2px}
.start-btn{width:100%;padding:12px;border-radius:var(--border-radius-lg);border:none;background:linear-gradient(135deg,#534AB7,#7F77DD);color:#fff;font-size:16px;font-weight:500;cursor:pointer;transition:transform 0.15s,opacity 0.15s}
.start-btn:hover{transform:scale(1.02)}
.start-btn:active{transform:scale(0.98)}

/* GAME SCREEN */
#game{max-width:520px;margin:0 auto}
.game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.back-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 12px;font-size:13px;color:var(--color-text-primary);cursor:pointer;display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--color-background-secondary)}
.game-title{font-size:16px;font-weight:500}
.restart-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 12px;font-size:13px;color:var(--color-text-primary);cursor:pointer}
.restart-btn:hover{background:var(--color-background-secondary)}
.stats{display:flex;gap:8px;justify-content:center;margin-bottom:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px 12px;font-size:12px;color:var(--color-text-secondary);text-align:center;flex:1}
.stat span{display:block;font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.2}
.board-wrap{position:relative;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1rem}
.board{display:grid;gap:8px;justify-content:center}

.card-wrap{perspective:900px;cursor:pointer;transition:transform 0.15s}
.card-wrap:hover:not(.matched):not(.locked-hover){transform:scale(1.06)}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s cubic-bezier(.4,1.3,.6,1)}
.card-wrap.flip .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.card-front{background:linear-gradient(135deg,#534AB7,#7F77DD);border:2px solid #AFA9EC}
.card-front::after{content:'?';font-size:22px;font-weight:500;color:rgba(255,255,255,0.75)}
.card-back{background:var(--color-background-primary);border:2px solid #AFA9EC;transform:rotateY(180deg)}
.card-wrap.matched .card-inner{animation:match-pop 0.35s ease forwards}
.card-wrap.matched .card-face{border-color:#1D9E75;background:#E1F5EE}

@keyframes match-pop{
  0%{transform:rotateY(180deg) scale(1)}
  40%{transform:rotateY(180deg) scale(1.15)}
  70%{transform:rotateY(180deg) scale(0.95)}
  100%{transform:rotateY(180deg) scale(1)}
}
.shuffle-anim .card-inner{transition:none}
.reveal-phase .card-wrap .card-inner{transform:rotateY(180deg);transition:none}

/* TIMER BAR */
.timer-bar-wrap{height:4px;border-radius:2px;background:var(--color-background-primary);margin-bottom:10px;overflow:hidden}
.timer-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#1D9E75,#534AB7);width:100%;transition:width 0.9s linear}
.timer-bar.warning{background:linear-gradient(90deg,#EF9F27,#D85A30)}

/* WIN OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.overlay.show{display:flex;animation:fade-in 0.35s ease}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.win-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem 2rem;text-align:center;max-width:320px;width:90%;animation:win-pop 0.45s cubic-bezier(.4,1.4,.6,1)}
@keyframes win-pop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.win-trophy{font-size:48px;margin-bottom:8px;display:block;animation:spin-in 0.55s cubic-bezier(.4,1.5,.6,1) 0.15s both}
@keyframes spin-in{from{transform:rotate(-30deg) scale(0);opacity:0}to{transform:rotate(0) scale(1);opacity:1}}
.win-title{font-size:22px;font-weight:500;margin-bottom:4px}
.win-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:10px}
.win-stats{font-size:13px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 16px;margin-bottom:1.25rem;line-height:1.8}
.win-stats strong{color:var(--color-text-primary);font-weight:500}
.win-actions{display:flex;flex-direction:column;gap:8px}
.win-play-btn{padding:10px 24px;border-radius:var(--border-radius-md);border:none;background:linear-gradient(135deg,#534AB7,#7F77DD);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:transform 0.15s}
.win-play-btn:hover{transform:scale(1.03)}
.win-home-btn{padding:10px 24px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-primary);font-size:14px;cursor:pointer}
.win-home-btn:hover{background:var(--color-background-secondary)}

.confetti-fixed{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.cp{position:absolute;border-radius:2px;opacity:0;animation:cf 1.3s ease forwards}
@keyframes cf{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
</style>

<h2 class="sr-only">Memory card game — flip cards to find matching pairs</h2>
<div id="root">

  <div id="home" class="screen active">
    <span class="home-trophy">🧠</span>
    <div class="home-title">Memory Game</div>
    <p class="home-sub">Match all the pairs before time gets the better of you!</p>
    <div class="level-grid" id="levelGrid">
      <div class="level-card selected" data-pairs="6">
  
        <span class="level-name">Easy</span>
        <span class="level-pairs">6 pairs</span>
      </div>
      <div class="level-card" data-pairs="10">
     
        <span class="level-name">Medium</span>
        <span class="level-pairs">10 pairs</span>
      </div>
      <div class="level-card" data-pairs="15">
        <span class="level-name">Hard</span>
        <span class="level-pairs">15 pairs</span>
      </div>
    </div>
    <button class="start-btn" id="startBtn">Start game</button>
  </div>

  <div id="game" class="screen">
    <div class="game-header">
      <button class="back-btn" id="backBtn">← Home</button>
      <span class="game-title" id="gameTitle">Easy</span>
      <button class="restart-btn" id="restartBtn">Restart</button>
    </div>
    <div class="stats">
      <div class="stat"><span id="sMoves">0</span>Moves</div>
      <div class="stat"><span id="sMatches">0</span>Matches</div>
      <div class="stat"><span id="sTime">0:00</span>Time</div>
      <div class="stat"><span id="sScore">—</span>Score</div>
    </div>
    <div class="board-wrap">
      <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
      <div class="board" id="board"></div>
    </div>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="win-box">
    <span class="win-trophy">🏆</span>
    <div class="win-title">Well done!</div>
    <p class="win-sub" id="winTagline">You matched all the pairs!</p>
    <div class="win-stats" id="winStats"></div>
    <div class="win-actions">
      <button class="win-play-btn" id="winPlayBtn">Play again</button>
      <button class="win-home-btn" id="winHomeBtn">Choose level</button>
    </div>
  </div>
</div>
<div class="confetti-fixed" id="confettiBox"></div>

<script>
const EMOJIS=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐵','🐔','🐧','🐦','🦆','🦉','🦇','🐝','🦋','🐛','🌸','🍓','🍕'];
const CC=['#534AB7','#1D9E75','#D85A30','#EF9F27','#D4537E','#378ADD'];
const LEVELS={6:{name:'Easy',cols:4},10:{name:'Medium',cols:5},15:{name:'Hard',cols:6}};

let pairs=6,flipped=[],matched=0,moves=0,locked=false,timer=null,secs=0,started=false;
let cardSize=72;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.querySelectorAll('.level-card').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.level-card').forEach(x=>x.classList.remove('selected'));
    c.classList.add('selected');
    pairs=+c.dataset.pairs;
  });
});

document.getElementById('startBtn').addEventListener('click',()=>{
  showScreen('game');
  initGame();
});
document.getElementById('backBtn').addEventListener('click',()=>{
  clearInterval(timer);
  showScreen('home');
});
document.getElementById('restartBtn').addEventListener('click',initGame);
document.getElementById('winPlayBtn').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('show');
  initGame();
});
document.getElementById('winHomeBtn').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('show');
  showScreen('home');
});

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function fmtTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60)}

function getScore(){
  if(!secs)return 0;
  const base=pairs*200;
  const movePenalty=Math.max(0,(moves-pairs)*15);
  const timePenalty=Math.min(secs*3,base);
  return Math.max(0,base-movePenalty-timePenalty);
}

function getRating(){
  const ideal=pairs+3;
  if(moves<=ideal)return'Perfect! 🌟';
  if(moves<=ideal*1.4)return'Great job! ✨';
  if(moves<=ideal*2)return'Well done!';
  return'Keep practicing!';
}

function updateTimerBar(){
  const bar=document.getElementById('timerBar');
  const maxTime=pairs*8;
  const pct=Math.max(0,100-(secs/maxTime*100));
  bar.style.width=pct+'%';
  bar.className='timer-bar'+(pct<30?' warning':'');
}

function stopTimer(){clearInterval(timer);timer=null;}

function startTimer(){
  stopTimer();
  timer=setInterval(()=>{
    secs++;
    document.getElementById('sTime').textContent=fmtTime(secs);
    document.getElementById('sScore').textContent=getScore();
    updateTimerBar();
  },1000);
}

function initGame(){
  matched=0;moves=0;locked=true;flipped=[];started=false;
  stopTimer();secs=0;
  document.getElementById('sMoves').textContent='0';
  document.getElementById('sMatches').textContent='0';
  document.getElementById('sTime').textContent='0:00';
  document.getElementById('sScore').textContent='—';
  document.getElementById('timerBar').style.width='100%';
  document.getElementById('timerBar').className='timer-bar';
  document.getElementById('gameTitle').textContent=LEVELS[pairs].name;

  const lvl=LEVELS[pairs];
  const cols=lvl.cols;
  const board=document.getElementById('board');
  const availW=Math.min(document.getElementById('game').offsetWidth||380,480)-32;
  cardSize=Math.floor(Math.min((availW-(cols-1)*8)/cols,82));

  board.style.gridTemplateColumns=`repeat(${cols},${cardSize}px)`;
  board.innerHTML='';

  const chosen=shuffle(EMOJIS.slice()).slice(0,pairs);
  const cards=shuffle([...chosen,...chosen]);

  cards.forEach(em=>{
    const w=document.createElement('div');
    w.className='card-wrap';
    w.style.width=cardSize+'px';
    w.style.height=cardSize+'px';
    const inner=document.createElement('div');
    inner.className='card-inner';
    inner.innerHTML=`<div class="card-face card-front"></div><div class="card-face card-back" style="font-size:${Math.round(cardSize*0.4)}px">${em}</div>`;
    w.appendChild(inner);
    w.addEventListener('click',()=>flip(w,em));
    board.appendChild(w);
  });

  doShuffleReveal();
}

function doShuffleReveal(){
  const cards=[...document.querySelectorAll('.card-wrap')];
  cards.forEach(c=>c.classList.remove('flip','matched'));

  // Phase 1: peek — show all cards
  setTimeout(()=>{
    cards.forEach((c,i)=>{
      setTimeout(()=>{c.querySelector('.card-inner').style.transition='transform 0.3s ease';c.classList.add('flip');},i*40);
    });
  },200);

  // Phase 2: shuffle animation — flip back with stagger
  const peekDur=1200+cards.length*40;
  setTimeout(()=>{
    cards.forEach((c,i)=>{
      setTimeout(()=>{c.querySelector('.card-inner').style.transition='transform 0.3s ease';c.classList.remove('flip');},i*35);
    });
    setTimeout(()=>{locked=false;},peekDur+cards.length*35+400);
  },peekDur);
}

function flip(el,em){
  if(locked||el.classList.contains('flip')||el.classList.contains('matched'))return;
  if(!started){started=true;startTimer();}
  el.querySelector('.card-inner').style.transition='transform 0.4s cubic-bezier(.4,1.3,.6,1)';
  el.classList.add('flip');
  flipped.push({el,em});
  if(flipped.length===2){
    locked=true;moves++;
    document.getElementById('sMoves').textContent=moves;
    if(flipped[0].em===flipped[1].em){
      flipped[0].el.classList.add('matched');
      flipped[1].el.classList.add('matched');
      matched++;
      document.getElementById('sMatches').textContent=matched;
      flipped=[];locked=false;
      if(matched===pairs){
        stopTimer();
        setTimeout(showWin,450);
      }
    }else{
      setTimeout(()=>{
        flipped[0].el.querySelector('.card-inner').style.transition='transform 0.35s ease';
        flipped[1].el.querySelector('.card-inner').style.transition='transform 0.35s ease';
        flipped[0].el.classList.remove('flip');
        flipped[1].el.classList.remove('flip');
        flipped=[];locked=false;
      },850);
    }
  }
}

function showWin(){
  spawnConfetti();
  const score=getScore();
  document.getElementById('winTagline').textContent=getRating();
  document.getElementById('winStats').innerHTML=
    `<strong>${moves}</strong> moves &nbsp;•&nbsp; <strong>${fmtTime(secs)}</strong> &nbsp;•&nbsp; Score: <strong>${score}</strong>`;
  document.getElementById('overlay').classList.add('show');
}

function spawnConfetti(){
  const box=document.getElementById('confettiBox');
  box.innerHTML='';
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='cp';
    el.style.cssText=`left:${Math.random()*100}%;top:${-8+Math.random()*-20}%;background:${CC[Math.floor(Math.random()*CC.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*0.9}s;animation-duration:${0.9+Math.random()*0.9}s`;
    box.appendChild(el);
  }
  setTimeout(()=>{box.innerHTML='';},2500);
}
</script>
